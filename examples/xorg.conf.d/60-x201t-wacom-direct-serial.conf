# Lenovo ThinkPad X201 Tablet internal Wacom ISDv4 pen digitizer.
#
# This is a serial tablet, not a USB Wacom device. The checked machine probes
# successfully at /dev/cuau2 and 19200 baud.

Section "InputDevice"
        Identifier "X201T Wacom stylus"
        Driver "wacom"
        Option "Type" "stylus"
        Option "Device" "/dev/cuau2"
        Option "BaudRate" "19200"
        Option "Mode" "Absolute"
        Option "TPCButton" "on"
        Option "AutoServerLayout" "true"
EndSection

Section "InputDevice"
        Identifier "X201T Wacom eraser"
        Driver "wacom"
        Option "Type" "eraser"
        Option "Device" "/dev/cuau2"
        Option "BaudRate" "19200"
        Option "Mode" "Absolute"
        Option "AutoServerLayout" "true"
EndSection
